<section class="view" id="cadastro">
<div class="page-head">
<div class="hl">
<h2>Cadastro de Cliente</h2>
<p>Novo cadastro de assinante</p>
</div>
</div>

<div class="form-card">
<div class="form-sec">
<div class="sec-title">
<span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
<div><b>Dados pessoais</b><small>Informações do titular</small></div>
</div>
<div class="fgrid">
<div class="fg"><label>Nome</label><input type="text" placeholder="Nome completo" value="Marina Castro Oliveira"></div>
<div class="fg"><label>Nome social <span class="opt">(opcional)</span></label><input type="text" placeholder="Nome social" value="Marina Castro"></div>
<div class="fg"><label>CPF</label><input type="text" placeholder="000.000.000-00" value="123.456.789-00"></div>
<div class="fg"><label>Data de nascimento</label><input type="date" value="1992-05-14"></div>
</div>
</div>

<div class="form-sec">
<div class="sec-title">
<span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
<div><b>Contato</b><small>Telefones e e-mail</small></div>
</div>
<div class="fgrid">
<div class="fg"><label>Telefone principal</label><input type="text" placeholder="(00) 00000-0000" value="(62) 99812-4477"></div>
<div class="fg"><label>E-mail</label><input type="text" placeholder="cliente@email.com" value="marina.castro@email.com"></div>
<div class="fg"><label>Telefone 2 <span class="opt">(opcional)</span></label><input type="text" placeholder="(00) 00000-0000" value="(62) 3212-8890"></div>
<div class="fg"><label>Telefone 3 <span class="opt">(opcional)</span></label><input type="text" placeholder="(00) 00000-0000" value=""></div>
</div>
</div>

<div class="form-sec">
<div class="sec-title">
<span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
<div><b>Endereços</b><small>Instalação e cobrança</small></div>
<label class="same-check"><input type="checkbox" id="sameAddr">Cobrança igual ao endereço</label>
</div>
<div class="fgrid">
<div class="fg full"><label>Endereço</label><input type="text" id="addr" placeholder="Rua, número, bairro, cidade - UF" value="Rua 10, nº 245, Setor Central, Goiânia - GO"></div>
<div class="fg full"><label>Endereço de cobrança</label><input type="text" id="billAddr" placeholder="Rua, número, bairro, cidade - UF" value="Rua 10, nº 245, Setor Central, Goiânia - GO"></div>
</div>
</div>

<div class="form-foot">
<button class="btn-ghost">Cancelar</button>
<button class="btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Salvar cliente</button>
</div>
</div>
</section>
