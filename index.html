<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="assets/css/01_base.css">
<link rel="stylesheet" href="assets/css/02_layout.css">
<link rel="stylesheet" href="assets/css/03_dashboard.css">

<body>
<div class="app" id="app">

</div>
<nav class="nav">
<div class="nav-group">

<button class="nav-item" data-view="venda" data-title="Fluxo da Venda" data-sub="Da proposta ao contrato assinado"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span class="txt">Fluxo da Venda</span></button>
</div>
<div class="nav-group">
<div class="label">Gestão</div>
<button class="nav-item active" data-view="dashboard" data-title="Dashboard" data-sub="Visão geral da operação"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span class="txt">Dashboard</span></button>
<button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span class="txt">Relatórios</span></button>

</nav>
<div class="side-foot">
<button class="user-card"><div class="avatar">RL</div><div class="info"><b>Renatha Loiola</b><small>Atendimento</small></div></button>
</div>
</aside>

<div class="scrim" id="scrim"></div>

<div class="main">
<header class="topbar">
<button class="icon-btn" id="toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<div class="page-title"><h1>Dashboard</h1><p>Visão geral da operação</p></div>
<div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Buscar..."></div>
<button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="dot"></span></button>
</header>

<main class="content">
<!-- Cada tela vive em modules/*.html e é injetada aqui em tempo de execução
     pelo engine/module-loader.js. Os ids (dashboard, leads, ...) são os
     mesmos usados pela navegação lateral e pelo JavaScript original. -->
<div data-module-slot="dashboard"></div>
<div data-module-slot="leads"></div>
<div data-module-slot="funil"></div>
<div data-module-slot="cadastro"></div>
<div data-module-slot="venda"></div>
<div data-module-slot="config"></div>
</main>
</div>
</div>

<!-- Modais e o Assistente de Venda (wizard), compartilhados entre telas -->
<div data-module-slot="modals"></div>

<script src="config/app.config.js"></script>
<script src="engine/module-loader.js"></script>
</body>
</html>
